<!DOCTYPE html>
<html lang="en">
<head>

<base href="/skyguide/">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoadGuide">

<meta name="theme-color" content="#080c14">

<link rel="manifest" href="/skyguide/manifest.json">
<link rel="apple-touch-icon" href="/skyguide/icon-192.png">

<title>RoadGuide</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
/* (your entire CSS stays exactly the same — unchanged) */
</style>

</head>
<body>

<div id="sky"></div>

<!-- Detail Overlay -->
<div id="overlay" onclick="closeOverlay(event)">
  <div id="ocard">
    <img id="oImg" src="" alt=""
      onerror="this.style.display='none';document.getElementById('oEmoji').style.display='flex'">
    <div id="oEmoji"></div>
    <div id="obody">
      <div id="otop">
        <div id="ometa">
          <div id="otag"></div>
          <div id="oname"></div>
          <div id="odist"></div>
        </div>
        <button id="oclose" onclick="closeOverlay()">✕</button>
      </div>
      <div id="ofact"></div>
    </div>
  </div>
</div>

<div id="app">

<!-- your entire HTML body stays identical -->

</div>

<!-- Data files -->
<script src="landmarks.js"></script>
<script src="landmarks_south.js"></script>
<script src="landmarks_topup.js"></script>

<script>

/* ALL your existing JavaScript stays the same */

/* ── SERVICE WORKER (FIXED PATH) ── */

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/skyguide/sw.js')
  .then(function(reg) {
    console.log('SW registered:', reg.scope);
  })
  .catch(function(err) {
    console.log('SW registration failed:', err);
  });
}

</script>

</body>
</html>
