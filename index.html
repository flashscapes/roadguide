<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RoadGuide">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>RoadGuide — California</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root{--dark:#0a0e1a;--gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:#7a6030;--white:#f0f4ff;--dim:#8090b0;--green:#4caf80;--red:#e05050;--cb:rgba(255,255,255,.04);--cbr:rgba(255,255,255,.08);}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;background:var(--dark);color:var(--white);font-family:'DM Sans',sans-serif;overflow:hidden;position:fixed;}
    #bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(26,42,74,.8) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(15,24,41,.9) 0%,transparent 60%),var(--dark);}
    #bg::before{content:'';position:absolute;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 30% 40%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 55% 10%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 75% 60%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 45% 80%,rgba(201,168,76,.35) 0%,transparent 100%),radial-gradient(1px 1px at 88% 25%,rgba(255,255,255,.4) 0%,transparent 100%);}
    #app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}
    header{padding:48px 20px 12px;display:flex;align-items:flex-end;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.05);}
    .logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;line-height:1;}
    .logo-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-top:2px;}
    .hst{text-align:right;}
    .hst p{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--dim);}
    .hst span{color:var(--gold-light);font-size:14px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;}
    #bar{height:3px;background:rgba(255,255,255,.05);flex-shrink:0;position:relative;overflow:hidden;}
    #bf{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));width:100%;transition:width 1s linear;}
    #scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 16px 100px;}
    #scr::-webkit-scrollbar{display:none;}
    .dw{display:flex;justify-content:center;padding:18px 0 10px;}
    #btn{display:flex;align-items:center;gap:12px;padding:16px 36px;border-radius:50px;border:1.5px solid rgba(201,168,76,.4);background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.03));cursor:pointer;transition:all .25s;-webkit-appearance:none;}
    #btn.on{background:linear-gradient(135deg,rgba(76,175,128,.15),rgba(76,175,128,.04));border-color:rgba(76,175,128,.55);}
    #btn:active{transform:scale(.97);}
    .bi{font-size:26px;}
    .bt{display:flex;flex-direction:column;}
    .bl{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--gold-light);}
    #btn.on .bl{color:#6ecf9c;}
    .bs{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;}
    #btn.on .bs{color:rgba(76,175,128,.6);}
    .st{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--cb);border:1px solid var(--cbr);border-radius:10px;margin:8px 0;font-family:'DM Mono',monospace;font-size:10px;}
    .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .dot.i{background:var(--dim);}
    .dot.s{background:var(--gold);animation:p 1.2s ease-in-out infinite;}
    .dot.a{background:var(--green);animation:p 2s ease-in-out infinite;}
    .dot.e{background:var(--red);}
    @keyframes p{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
    .sm{color:var(--dim);flex:1;}
    #tmr{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold-dim);}
    .sl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin:12px 0 8px;}
    #lst{display:flex;flex-direction:column;gap:8px;}
    .li{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--cb);border:1px solid var(--cbr);border-radius:12px;cursor:pointer;transition:all .2s;}
    .li:active{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.25);}
    .li.seen{opacity:.4;}
    .lt{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:rgba(201,168,76,.06);}
    .le{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:rgba(201,168,76,.06);}
    .li-i{flex:1;min-width:0;}
    .li-n{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .li-c{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:2px;}
    .li-co{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold-dim);margin-top:1px;}
    .li-r{text-align:right;flex-shrink:0;}
    .li-d{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold-light);}
    .li-b{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);}
    #gps{padding:8px 14px;background:var(--cb);border:1px solid var(--cbr);border-radius:10px;margin-top:12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);display:flex;gap:10px;flex-wrap:wrap;}
    #pop{position:fixed;top:0;left:0;right:0;z-index:200;transform:translateY(-110%);transition:transform .5s cubic-bezier(.16,1,.3,1);pointer-events:none;padding:10px 12px 0;}
    #pop.show{transform:translateY(0);pointer-events:all;}
    .pc{background:linear-gradient(160deg,rgba(15,24,41,.98),rgba(10,14,26,.99));border:1px solid rgba(201,168,76,.4);border-radius:20px;overflow:hidden;box-shadow:0 12px 60px rgba(0,0,0,.7);}
    #pp{width:100%;height:145px;object-fit:cover;display:block;}
    #pe{width:100%;height:145px;display:none;align-items:center;justify-content:center;font-size:60px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(26,42,74,.9));}
    .pb{padding:14px 16px 16px;}
    .pt{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
    .ptl{flex:1;}
    .ptag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
    .pnm{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;}
    .pds{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);margin-top:3px;}
    .pds b{color:var(--gold-light);font-weight:400;}
    #px{width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);cursor:pointer;-webkit-appearance:none;}
    .pf{font-size:13px;line-height:1.65;font-weight:300;}
    .pf em{color:var(--gold-light);font-style:normal;font-weight:500;}
    .pg{height:3px;background:rgba(255,255,255,.08);margin-top:12px;border-radius:2px;overflow:hidden;}
    #pgb{height:100%;background:var(--gold);width:100%;transition:width .5s linear;}
    .hdiv{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent);margin:14px 0;}
  </style>
</head>
<body>
<div id="bg"></div>
<div id="pop">
  <div class="pc">
    <img id="pp" src="" alt="" onerror="this.style.display='none';document.getElementById('pe').style.display='flex'">
    <div id="pe"></div>
    <div class="pb">
      <div class="pt">
        <div class="ptl">
          <div class="ptag" id="ptag">Nearby</div>
          <div class="pnm" id="pnm">—</div>
          <div class="pds" id="pds">—</div>
        </div>
        <button id="px" onclick="dismiss()">✕</button>
      </div>
      <div class="pf" id="pf">—</div>
      <div class="pg"><div id="pgb"></div></div>
    </div>
  </div>
</div>
<div id="app">
  <header>
    <div><div class="logo">RoadGuide</div><div class="logo-sub">California Explorer</div></div>
    <div class="hst">
      <p>LANDMARKS <span id="tc">—</span></p>
      <p>DISCOVERED <span id="sc">0</span></p>
    </div>
  </header>
  <div id="bar"><div id="bf"></div></div>
  <div id="scr">
    <div class="dw">
      <button id="btn" onclick="toggle()">
        <div class="bi">🚗</div>
        <div class="bt"><div class="bl" id="bl">Start Driving</div><div class="bs" id="bs">Tap to enable proximity alerts</div></div>
      </button>
    </div>
    <div class="st"><div class="dot i" id="dot"></div><div class="sm" id="sm">Tap Start Driving to begin</div><div id="tmr"></div></div>
    <div class="sl" id="sl">Nearby landmarks will appear here</div>
    <div id="lst"></div>
    <div class="hdiv"></div>
    <div id="gps"><span id="gla">LAT —</span><span id="glo">LON —</span><span id="gsp">SPD —</span></div>
  </div>
</div>
<script src="landmarks.js"></script>
<script src="landmarks_south.js"></script>
<script src="landmarks_topup.js"></script>
<script>
const ALL=[...LANDMARKS,...LANDMARKS_SOUTH,...LANDMARKS_TOPUP];
let on=false,wid=null,stimer=null,secs=0,lat=null,lon=null;
let seen=new Set(),queue=[],showing=false,ptimer=null;
const SECS=15,RAD=5.0;
function d(a,b,c,e){const R=3958.8,dL=(c-a)*Math.PI/180,dl=(e-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function b(a,b,c,e){const dl=(e-b)*Math.PI/180,y=Math.sin(dl)*Math.cos(c*Math.PI/180),x=Math.cos(a*Math.PI/180)*Math.sin(c*Math.PI/180)-Math.sin(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.cos(dl);return(Math.atan2(y,x)*180/Math.PI+360)%360;}
function cd(v){return['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(v/22.5)%16];}
function st(cls,msg){document.getElementById('dot').className='dot '+cls;document.getElementById('sm').textContent=msg;}
function toggle(){on?stop():go();}
function go(){
  if(!navigator.geolocation){st('e','GPS not available');return;}
  on=true;document.getElementById('btn').classList.add('on');
  document.getElementById('bl').textContent='Driving';
  document.getElementById('bs').textContent='Tap to stop';
  st('s','Acquiring GPS…');
  wid=navigator.geolocation.watchPosition(pos,err,{enableHighAccuracy:true,timeout:12000,maximumAge:5000});
}
function stop(){
  on=false;if(wid!==null){navigator.geolocation.clearWatch(wid);wid=null;}
  clearInterval(stimer);document.getElementById('btn').classList.remove('on');
  document.getElementById('bl').textContent='Start Driving';
  document.getElementById('bs').textContent='Tap to enable proximity alerts';
  document.getElementById('bf').style.width='100%';
  document.getElementById('tmr').textContent='';st('i','Stopped');
}
function err(e){const m={1:'Location permission denied.',2:'Position unavailable.',3:'GPS timed out.'};st('e',m[e.code]||'GPS error.');}
function pos(p){
  lat=p.coords.latitude;lon=p.coords.longitude;
  const spd=p.coords.speed;
  document.getElementById('gla').textContent='LAT '+lat.toFixed(4);
  document.getElementById('glo').textContent='LON '+lon.toFixed(4);
  document.getElementById('gsp').textContent=spd!==null?'SPD '+Math.round(spd*2.237)+' mph':'SPD —';
  st('a','Driving — scanning for landmarks');
  refresh();scan();tick();
}
function tick(){
  clearInterval(stimer);secs=SECS;bar();
  stimer=setInterval(()=>{secs--;bar();if(secs<=0){secs=SECS;if(lat)scan();}},1000);
}
function bar(){document.getElementById('bf').style.width=(secs/SECS*100)+'%';document.getElementById('tmr').textContent='scan in '+secs+'s';}
function scan(){
  if(!lat)return;
  ALL.map(lm=>({...lm,dist:d(lat,lon,lm.lat,lm.lon)}))
    .filter(lm=>lm.dist<=RAD&&!seen.has(lm.name))
    .sort((a,z)=>a.dist-z.dist)
    .forEach(lm=>{seen.add(lm.name);queue.push(lm);});
  document.getElementById('sc').textContent=seen.size;
  if(!showing&&queue.length>0)showNext();
}
function showNext(){
  if(!queue.length){showing=false;return;}
  showing=true;const lm=queue.shift();
  const ph=document.getElementById('pp'),pe=document.getElementById('pe');
  if(lm.photo){ph.style.display='block';pe.style.display='none';ph.src=lm.photo;ph.onerror=()=>{ph.style.display='none';pe.style.display='flex';};}
  else{ph.style.display='none';pe.style.display='flex';pe.textContent=lm.emoji;}
  document.getElementById('ptag').textContent=lm.county+' County · '+lm.cat;
  document.getElementById('pnm').textContent=lm.name;
  const dist=lm.dist!==undefined?lm.dist.toFixed(1):'?';
  const dir=lat?cd(b(lat,lon,lm.lat,lm.lon)):'';
  document.getElementById('pds').innerHTML='<b>'+dist+' miles</b> · '+dir;
  document.getElementById('pf').innerHTML=lm.fact;
  const pg=document.getElementById('pgb');pg.style.transition='none';pg.style.width='100%';
  setTimeout(()=>{pg.style.transition='width 12s linear';pg.style.width='0%';},50);
  document.getElementById('pop').classList.add('show');
  clearTimeout(ptimer);ptimer=setTimeout(dismiss,12000);
}
function dismiss(){
  clearTimeout(ptimer);document.getElementById('pop').classList.remove('show');
  setTimeout(()=>{if(queue.length>0)showNext();else showing=false;},600);
}
function detail(lm){
  const dist=lat?d(lat,lon,lm.lat,lm.lon).toFixed(1):'?';
  const dir=lat?cd(b(lat,lon,lm.lat,lm.lon)):'';
  const ph=document.getElementById('pp'),pe=document.getElementById('pe');
  if(lm.photo){ph.style.display='block';pe.style.display='none';ph.src=lm.photo;ph.onerror=()=>{ph.style.display='none';pe.style.display='flex';};}
  else{ph.style.display='none';pe.style.display='flex';pe.textContent=lm.emoji;}
  document.getElementById('ptag').textContent=lm.county+' County · '+lm.cat;
  document.getElementById('pnm').textContent=lm.name;
  document.getElementById('pds').innerHTML='<b>'+dist+' miles</b> · '+dir;
  document.getElementById('pf').innerHTML=lm.fact;
  const pg=document.getElementById('pgb');pg.style.transition='none';pg.style.width='100%';
  document.getElementById('pop').classList.add('show');
  clearTimeout(ptimer);ptimer=setTimeout(dismiss,20000);
}
function refresh(){
  if(!lat)return;
  const sorted=ALL.map(lm=>({...lm,dist:d(lat,lon,lm.lat,lm.lon),brg:b(lat,lon,lm.lat,lm.lon)})).sort((a,z)=>a.dist-z.dist).slice(0,25);
  const el=document.getElementById('lst');el.innerHTML='';
  document.getElementById('sl').textContent='Nearest Landmarks';
  sorted.forEach(lm=>{
    const row=document.createElement('div');
    row.className='li'+(seen.has(lm.name)?' seen':'');
    const th=lm.photo?`<img class="lt" src="${lm.photo}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="le" style="display:none">${lm.emoji}</div>`:`<div class="le">${lm.emoji}</div>`;
    row.innerHTML=`${th}<div class="li-i"><div class="li-n">${lm.name}</div><div class="li-c">${lm.cat}</div><div class="li-co">${lm.county}${seen.has(lm.name)?' · ✓':''}</div></div><div class="li-r"><div class="li-d">${lm.dist.toFixed(1)} mi</div><div class="li-b">${cd(lm.brg)}</div></div>`;
    row.onclick=()=>detail(lm);el.appendChild(row);
  });
}
document.getElementById('tc').textContent=ALL.length;
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
